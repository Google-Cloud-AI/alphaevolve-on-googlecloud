---
tags: [alpha-evolve, test, experiment]
timeout: 3600s
steps:
- id: deploy-experiment
  name: us-central1-docker.pkg.dev/$PROJECT_ID/hpc-toolkit-repo/test-runner
  automapSubstitutions: true
  script: |
    #!/usr/bin/env bash
    set -ex
    apt-get update && apt-get install -y gettext-base
    cd /workspace
    export PATH=$PATH:/workspace
    depl_name="alpha-evolve-experiment"
    BLUEPRINT="alpha-evolve-experiment.yaml"

    # Generate random names
    RANDOM_STRING=$(cat /dev/urandom | tr -dc 'a-z0-9' | fold -w 8 | head -n 1)
    BUCKET_NAME="alpha-evolve-test-${RANDOM_STRING}"
    INFRA_NAME="ae-test-infra-${RANDOM_STRING}"
    TOPIC_NAME="${INFRA_NAME}-batch-notifications"
    EXP_NAME="test-${RANDOM_STRING}"
    echo "Using bucket: gs://${BUCKET_NAME}, topic: ${TOPIC_NAME}, experiment: ${EXP_NAME}"
    
    # Create bucket
    gcloud storage buckets create gs://${BUCKET_NAME} --project=${PROJECT_ID} --location=us-central1 || true

    export GHPC_VALIDATION_LEVEL=ignore
    cleanup() {
      echo "Starting cleanup..."
      gcluster destroy ~/alpha-evolve-experiment-output/$depl_name-${EXP_NAME} --auto-approve
      echo "Deleting bucket gs://${BUCKET_NAME}"
      gcloud storage rm --recursive gs://${BUCKET_NAME} --project=${PROJECT_ID} --quiet || true
      echo "Deleting subscription ${depl_name}-${EXP_NAME}-subscription"
      gcloud pubsub subscriptions delete "${depl_name}-${EXP_NAME}-subscription" --project=${PROJECT_ID} --quiet || true
      echo "Deleting Pub/Sub topic ${TOPIC_NAME}"
      gcloud pubsub topics delete ${TOPIC_NAME} --project=${PROJECT_ID} --quiet || true
    }
    trap cleanup EXIT
    gcloud artifacts repositories delete "${depl_name}-${EXP_NAME}-repo" --location=us-central1 --project="${PROJECT_ID}" --quiet || true
    gcloud pubsub subscriptions delete "${depl_name}-${EXP_NAME}-subscription" --project="${PROJECT_ID}" --quiet || true
    gcloud pubsub topics describe ${TOPIC_NAME} --project="${PROJECT_ID}" >/dev/null 2>&1 || gcloud pubsub topics create ${TOPIC_NAME} --project="${PROJECT_ID}"
    gcluster deploy "$BLUEPRINT" -d alpha-evolve-deployment.yaml -o ~/alpha-evolve-experiment-output --vars="project_id=${PROJECT_ID}" --vars="user_experiment_name=${EXP_NAME}" --vars="infra_deployment_name=${INFRA_NAME}" --vars="exp_deployment_name=$depl_name" --vars="existing_bucket_name=${BUCKET_NAME}" --vars="service_account=660456334398-compute@developer.gserviceaccount.com" --auto-approve -l IGNORE
    export ANSIBLE_HOST_KEY_CHECKING=false
    ansible-playbook ansible_playbooks/test-validation/test-alpha-evolve-experiment.yml \
      --extra-vars="project=${PROJECT_ID} repo_name=${depl_name}-${EXP_NAME}-repo experiment_name=${EXP_NAME} deployment_name=${depl_name}-${EXP_NAME}"
