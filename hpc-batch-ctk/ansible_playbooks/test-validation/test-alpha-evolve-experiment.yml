---
- name: Validate experiment deployment resources
  hosts: localhost
  gather_facts: false
  tasks:
  - name: Verify Artifact Registry exists
    changed_when: false
    ansible.builtin.command: gcloud artifacts repositories list --project={{ project }}
  - name: Get list of Docker images in repo
    changed_when: false
    ansible.builtin.command: gcloud artifacts docker images list us-central1-docker.pkg.dev/{{ project }}/{{ repo_name }}
    register: image_list
  - name: Verify Controller image exists
    ansible.builtin.assert:
      that: "'{{ experiment_name }}-controller' in image_list.stdout"
      fail_msg: "Controller image not found in registry."
  - name: Verify Evaluator image exists
    ansible.builtin.assert:
      that: "'{{ experiment_name }}-evaluator' in image_list.stdout"
      fail_msg: "Evaluator image not found in registry."
  - name: Verify Pub/Sub Subscription exists
    changed_when: false
    ansible.builtin.command: gcloud pubsub subscriptions describe {{ deployment_name }}-subscription --project={{ project }}

  - name: Validate Pub/Sub subscription filter functionality
    block:
    - name: Get attached Pub/Sub topic for subscription
      changed_when: false
      ansible.builtin.shell: gcloud pubsub subscriptions describe {{ deployment_name }}-subscription --project={{ project }} --format="value(topic)" | awk -F'/' '{print $NF}'
      register: sub_topic

    - name: Get matching JobName prefix from subscription filter
      changed_when: false
      ansible.builtin.shell: gcloud pubsub subscriptions describe {{ deployment_name }}-subscription --project={{ project }} --format="value(filter)" | grep -o 'projects/[^"]*'
      register: job_prefix

    - name: Publish positive matching message to Pub/Sub topic
      changed_when: false
      ansible.builtin.command: gcloud pubsub topics publish {{ sub_topic.stdout }} --message="filter_positive_test" --attribute="JobName={{ job_prefix.stdout }}positive-match" --project={{ project }}

    - name: Pull positive matching message from subscription
      changed_when: false
      ansible.builtin.command: gcloud pubsub subscriptions pull {{ deployment_name }}-subscription --auto-ack --limit=5 --format="value(message.data)" --project={{ project }}
      register: pull_pos
      failed_when: "'filter_positive_test' not in pull_pos.stdout"

    - name: Publish negative non-matching message to Pub/Sub topic
      changed_when: false
      ansible.builtin.command: gcloud pubsub topics publish {{ sub_topic.stdout }} --message="filter_negative_test" --attribute="JobName=projects/000000/locations/global/jobs/other-deployment-negative-match" --project={{ project }}

    - name: Verify negative non-matching message is filtered out
      changed_when: false
      ansible.builtin.command: gcloud pubsub subscriptions pull {{ deployment_name }}-subscription --auto-ack --limit=5 --format="value(message.data)" --project={{ project }}
      register: pull_neg
      failed_when: "'filter_negative_test' in pull_neg.stdout"
