blueprint_name: alpha-evolve-platform

vars:
  # === GCP Project & Deployment Infrastructure ===
  exp_deployment_name: alpha-evolve-experiment
  user_experiment_name: experiment-1
  deployment_name: $(vars.exp_deployment_name)-$(vars.user_experiment_name)
  zone: us-central1-a
  service_account: "alpha-evolve-infra-sa@$(vars.project_id).iam.gserviceaccount.com"

  # === Paths & Build Config (Internal) ===
  cloud_build_path: $(ghpc_stage("./infrastructure/build/cloud-build.yaml"))
  cloud_build_dir: $(ghpc_stage("."))

  # === Docker Images ===
  base_controller_image: python:3.12-slim-bookworm # base image for the controller job
  base_evaluator_image: python:3.12-slim-bookworm # base image for the evaluator job

  # === AlphaEvolve API Config ===
  region_code: global
  location: global
  base_url: discoveryengine.googleapis.com
  collection: default_collection
  concurrency: 4 # number of concurrent candidates to AlphaEvolve will generate at one time.
  model: GEMINI_V2P5_FLASH
  max_programs_generated: 100 # max number of programs AE API will generate in total
  max_duration: 6 # Absolute maximum wall-clock lifespan of the experiment run in hours (valid range: 1 to 24)
  idle_timeout: 5 # Maximum inactivity period allowed in hours (must be strictly less than max_duration)

  # === Experiment Execution Control ===
  max_programs_evaluated: 10 # number of evaluations jobs that will be run
  num_samplers: 4 # number of threads polling AlphaEvolve API for candidates
  poll_interval: 4 # in seconds
  evaluation_mode: "batch" # "batch"

  # === Cloud Batch & Worker VM Config ===
  evaluation_machine_type: n2-standard-4
  evaluation_provisioning_model: "SPOT"
  boot_disk_image: "projects/debian-cloud/global/images/family/debian-12"
  mount_path: "/mnt/disks/share"
  max_duration_seconds: 3600
  delete_succeeded_jobs: "true"
  accelerator_count: 1 # only used if evaluation_machine_type starts with "n1-" for GPU attach
  accelerator_type: "nvidia-tesla-t4" # only used if evaluation_machine_type starts with "n1-" for GPU attach

  # === Storage Config ===
  programs_dir: "program_candidates"

  # === Example Config ===
  validate_config_experiment_script: $(ghpc_stage("./tools/validate_config_experiment.sh"))
  example_dir: "user_examples/adaptive_sort_cpp"

deployment_groups:

- group: validation
  modules:
  - id: validate-config
    source: community/modules/scripts/gcloud
    settings:
      commands:
      - create: |
          bash $(vars.validate_config_experiment_script) \
            "$(vars.user_experiment_name)" \
            "$(vars.cloud_build_dir)" \
            "$(vars.example_dir)" \
            "$(vars.evaluation_mode)" \
            "$(vars.evaluation_provisioning_model)" \
            "$(vars.evaluation_machine_type)" \
            "$(vars.zone)" \
            "$(vars.accelerator_count)" \
            "$(vars.accelerator_type)" \
            "$(vars.max_duration)" \
            "$(vars.idle_timeout)" \
            "$(vars.model)"
        delete: "echo 'Nothing to be done'"

- group: project-experiment-metadata
  modules:
  - id: set-project-experiment-metadata
    source: community/modules/scripts/gcloud
    settings:
      commands:
      - create: 'gcloud compute project-info add-metadata --project=$(vars.project_id) --metadata="$(vars.user_experiment_name)_USER_EXPERIMENT_NAME=$(vars.user_experiment_name)"'
        delete: 'gcloud compute project-info remove-metadata --project=$(vars.project_id) --keys $(vars.user_experiment_name)_USER_EXPERIMENT_NAME'

# Group 1: Static Infrastructure (Decoupled & Protected Registry)
- group: repository-infrastructure
  modules:
  - id: create-repository
    source: community/modules/scripts/gcloud
    settings:
      commands:
      - create: "gcloud artifacts repositories describe $(vars.deployment_name)-repo --location=$(vars.region) --project=$(vars.project_id) >/dev/null 2>&1 || gcloud artifacts repositories create $(vars.deployment_name)-repo --repository-format=docker --location=$(vars.region) --project=$(vars.project_id)"
        delete: "gcloud artifacts repositories delete $(vars.deployment_name)-repo --location=$(vars.region) --project=$(vars.project_id) --quiet || true"

- group: cloud-build
  modules:
  - id: build-containers
    source: community/modules/scripts/gcloud
    settings:
      commands:
      - create: '_USER_EXPERIMENT_NAME="$(vars.user_experiment_name)" _EXAMPLE_DIR="$(vars.example_dir)" _PROJECT_ID="$(vars.project_id)" _BASE_CONTROLLER_IMAGE="$(vars.base_controller_image)" _BASE_EVALUATOR_IMAGE="$(vars.base_evaluator_image)" _REPO_NAME="$(vars.deployment_name)-repo" _BOOT_DISK_IMAGE="$(vars.boot_disk_image)" _REGION="$(vars.region)" envsubst < $(vars.cloud_build_path) > cloud-build-local.yaml'
        delete: "rm -f cloud-build-local.yaml"
      - create: "sleep 10"
        delete: "echo 'Nothing to be done'"
      - create: "gcloud builds submit $(vars.cloud_build_dir) --config cloud-build-local.yaml --gcs-source-staging-dir=gs://$(vars.existing_bucket_name)/cloudbuild/staging --service-account=projects/$(vars.project_id)/serviceAccounts/$(vars.service_account) --project=$(vars.project_id)"
        delete: "echo 'Cloud build lifecycle completed.'"

- group: pubsub-subscription
  modules:
  - id: experiment-subscription
    source: community/modules/scripts/gcloud
    settings:
      commands:
      - create: |
          PROJECT_NUMBER=`gcloud projects describe $(vars.project_id) --format="value(projectNumber)"`
          DEPLOYMENT_NAME="$(vars.deployment_name)"
          SAFE_PREFIX="\${DEPLOYMENT_NAME:0:42}"
          gcloud pubsub subscriptions create $(vars.deployment_name)-subscription \
            --topic=$(vars.infra_deployment_name)-batch-notifications \
            --project=$(vars.project_id) \
            --message-filter="hasPrefix(attributes.JobName, \"projects/\$PROJECT_NUMBER/locations/$(vars.region)/jobs/\$SAFE_PREFIX\")"
        delete: "gcloud pubsub subscriptions delete $(vars.deployment_name)-subscription --project=$(vars.project_id) --quiet"

- group: experiment-env-file
  modules:
  - id: write-env-file
    source: community/modules/scripts/gcloud
    settings:
      commands:
      - create: |
          echo "_PROJECT_ID=\"$(vars.project_id)\"" > variables.env
          echo "_PUBSUB_SUBSCRIPTION=\"$(vars.deployment_name)-subscription\"" >> variables.env
          echo "_REPO_NAME=\"$(vars.exp_deployment_name)-$(vars.user_experiment_name)-repo\"" >> variables.env
          echo "_MOUNT_PATH=\"$(vars.mount_path)\"" >> variables.env
          echo "_REGION_CODE=\"$(vars.region_code)\"" >> variables.env
          echo "_BASE_URL=\"$(vars.base_url)\"" >> variables.env
          echo "_COLLECTION=\"$(vars.collection)\"" >> variables.env
          echo "_CONCURRENCY=\"$(vars.concurrency)\"" >> variables.env
          echo "_LOCATION=\"$(vars.location)\"" >> variables.env
          echo "_NUM_SAMPLERS=\"$(vars.num_samplers)\"" >> variables.env
          echo "_POLL_INTERVAL=\"$(vars.poll_interval)\"" >> variables.env
          echo "_MODEL=\"$(vars.model)\"" >> variables.env
          echo "_DEPLOYMENT_NAME=\"$(vars.deployment_name)\"" >> variables.env
          echo "_MAX_DURATION_SECONDS=\"$(vars.max_duration_seconds)\"" >> variables.env
          echo "_EVALUATION_MACHINE_TYPE=\"$(vars.evaluation_machine_type)\"" >> variables.env
          echo "_EVALUATION_MODE=\"$(vars.evaluation_mode)\"" >> variables.env
          echo "_PROGRAMS_DIR=\"$(vars.programs_dir)\"" >> variables.env
          echo "_MAX_PROGRAMS_GENERATED=\"$(vars.max_programs_generated)\"" >> variables.env
          echo "_MAX_DURATION=\"$(vars.max_duration)\"" >> variables.env
          echo "_IDLE_TIMEOUT=\"$(vars.idle_timeout)\"" >> variables.env
          echo "_MAX_PROGRAMS_EVALUATED=\"$(vars.max_programs_evaluated)\"" >> variables.env
          echo "_DELETE_SUCCEEDED_JOBS=\"$(vars.delete_succeeded_jobs)\"" >> variables.env
          echo "_EVALUATION_PROVISIONING_MODEL=\"$(vars.evaluation_provisioning_model)\"" >> variables.env
          echo "_USER_EXPERIMENT_NAME=\"$(vars.user_experiment_name)\"" >> variables.env
          echo "_BOOT_DISK_IMAGE=\"$(vars.boot_disk_image)\"" >> variables.env
          echo "_CONTROLLER_IMAGE_URI=\"$(vars.region)-docker.pkg.dev/$(vars.project_id)/$(vars.exp_deployment_name)-$(vars.user_experiment_name)-repo/$(vars.user_experiment_name)-controller:latest\"" >> variables.env
          echo "_EVALUATOR_IMAGE_URI=\"$(vars.region)-docker.pkg.dev/$(vars.project_id)/$(vars.exp_deployment_name)-$(vars.user_experiment_name)-repo/$(vars.user_experiment_name)-evaluator:latest\"" >> variables.env
          echo "_ACCELERATOR_COUNT=\"$(vars.accelerator_count)\"" >> variables.env
          echo "_ACCELERATOR_TYPE=\"$(vars.accelerator_type)\"" >> variables.env
          gcloud storage cp variables.env gs://$(vars.existing_bucket_name)/$(vars.user_experiment_name)/variables.env --project=$(vars.project_id)
          rm variables.env
        delete: |-
          gcloud storage rm gs://$(vars.existing_bucket_name)/$(vars.user_experiment_name)/variables.env --project=$(vars.project_id) || true

- group: show-instructions
  modules:
  - id: show-instructions
    source: community/modules/scripts/gcloud
    settings:
      commands:
      - create: |
          printf '%b' "
          \033[1;33m====================================================================\033[0m
          \033[1;32m==== How to run your experiment in the Notebook ====\033[0m
          All configurations have been natively saved to GCS under: gs://$(vars.existing_bucket_name)/$(vars.user_experiment_name)/
          
          Please open the Jupyter Notebook and follow these steps under the 'Show how change experiment run' section:
          
          1. Go to the section: \033[1;36m'Adjust environment variables on the Notebook'\033[0m.
          2. Run the interactive cell: \033[1;36m'Run this cell to specify the experiment...'\033[0m.
          3. Select the option corresponding to: \033[1;36m'$(vars.user_experiment_name)'\033[0m.
             This will dynamically load all of your GCS environment variables!
          \033[1;33m====================================================================\033[0m
          " > /dev/tty 2>&1 || true
        delete: "echo 'Nothing to be done'"
