apiVersion: v1
kind: Namespace
metadata:
  name: alphaevolve
---
# Service account for training jobs — bound to GCP SA via Workload Identity
# for GCS access (reading model/dataset, writing job I/O).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alphaevolve-training
  namespace: alphaevolve
  # iam.gke.io/gcp-service-account annotation set by Terraform
---
# Service account for the gateway — bound to GCP SA via Workload Identity
# for GCS access and RayJob management.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alphaevolve-gateway
  namespace: alphaevolve
  # iam.gke.io/gcp-service-account annotation set by Terraform
---
# RBAC: Allow gateway to create, read, delete RayJobs and read Pods in namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-manager
  namespace: alphaevolve
rules:
  - apiGroups: ["ray.io"]
    resources: ["rayjobs", "rayjobs/status"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "jobs/status"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-job-manager
  namespace: alphaevolve
subjects:
  - kind: ServiceAccount
    name: alphaevolve-gateway
    namespace: alphaevolve
roleRef:
  kind: Role
  name: job-manager
  apiGroup: rbac.authorization.k8s.io
