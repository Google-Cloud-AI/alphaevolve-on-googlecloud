# ServiceMonitor: tells Prometheus to scrape the gateway /metrics endpoint.
# Requires kube-prometheus-stack to be installed in the monitoring namespace.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: alphaevolve-gateway
  namespace: alphaevolve
  labels:
    app: alphaevolve-gateway
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: alphaevolve-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
