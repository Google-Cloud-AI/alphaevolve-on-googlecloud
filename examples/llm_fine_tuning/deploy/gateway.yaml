apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: alphaevolve
  labels:
    app: alphaevolve-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alphaevolve-gateway
  template:
    metadata:
      labels:
        app: alphaevolve-gateway
    spec:
      serviceAccountName: alphaevolve-gateway
      containers:
        - name: gateway
          image: GATEWAY_IMAGE # Replaced by cloudbuild or kustomize
          ports:
            - containerPort: 8080
          env:
            - name: ARTIFACTS_BUCKET
              value: "" # Set to your GCS bucket name
            - name: NAMESPACE
              value: "alphaevolve"
            - name: ARTIFACTS_PATH
              value: "/mnt/artifacts"
            - name: RAY_CLUSTER_NAME
              value: "alphaevolve-ray-cluster"
            - name: JOB_TIMEOUT_SECONDS
              value: "2400"
            - name: JOB_POLL_INTERVAL
              value: "10"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: alphaevolve
  labels:
    app: alphaevolve-gateway
spec:
  type: ClusterIP
  selector:
    app: alphaevolve-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
