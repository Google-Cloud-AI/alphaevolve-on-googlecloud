# Persistent RayCluster for AlphaEvolve training evaluations.
# The gateway creates RayJobs that run on this cluster.
# Workers auto-scale based on pending jobs.
#
# Access Ray Dashboard:
#   kubectl port-forward -n alphaevolve svc/alphaevolve-ray-cluster-head-svc 8265:8265
#   open http://localhost:8265
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: alphaevolve-ray-cluster
  namespace: alphaevolve
spec:
  rayVersion: "2.54.0"

  # --- Head node: orchestration only (no GPU) ---
  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
      no-monitor: ""
    template:
      metadata:
        annotations:
          gke-gcsfuse/volumes: "true"
      spec:
        containers:
          - name: ray-head
            image: TRAINING_IMAGE_PLACEHOLDER
            ports:
              - containerPort: 6379
                name: gcs-server
              - containerPort: 8265
                name: dashboard
              - containerPort: 10001
                name: client
              - containerPort: 8080
                name: metrics
              - containerPort: 44217
                name: as-metrics
              - containerPort: 44227
                name: dash-metrics
            livenessProbe:
              httpGet:
                path: /
                port: 8265
              initialDelaySeconds: 60
              periodSeconds: 15
              timeoutSeconds: 5
              failureThreshold: 10
            readinessProbe:
              httpGet:
                path: /
                port: 8265
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 5
            env:
              - name: RAY_TRAIN_V2_WORKER_GROUP_START_TIMEOUT_S
                value: "600"
              - name: RAY_GRAFANA_IFRAME_HOST
                value: "http://127.0.0.1:3000"
              - name: RAY_GRAFANA_HOST
                value: "http://kube-prometheus-stack-grafana.monitoring.svc:80"
              - name: RAY_PROMETHEUS_HOST
                value: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
            resources:
              limits:
                cpu: "4"
                memory: "16Gi"
              requests:
                cpu: "2"
                memory: "8Gi"
            volumeMounts:
              - name: gcs-artifacts
                mountPath: /mnt/artifacts
        volumes:
          - name: gcs-artifacts
            csi:
              driver: gcsfuse.csi.storage.gke.io
              volumeAttributes:
                bucketName: ARTIFACTS_BUCKET_PLACEHOLDER
                mountOptions: "implicit-dirs"
        serviceAccountName: alphaevolve-training

  # --- GPU workers: one A100 per worker, auto-scaling ---
  workerGroupSpecs:
    - replicas: 4
      minReplicas: 4
      maxReplicas: 4
      groupName: a100-workers
      rayStartParams: {}
      template:
        metadata:
          annotations:
            gke-gcsfuse/volumes: "true"
        spec:
          containers:
            - name: ray-worker
              image: TRAINING_IMAGE_PLACEHOLDER
              env:
                - name: PYTORCH_ALLOC_CONF
                  value: "expandable_segments:True"
                - name: RAY_memory_usage_threshold
                  value: "1.0"
                - name: RAY_TRAIN_V2_WORKER_GROUP_START_TIMEOUT_S
                  value: "600"
              ports:
                - containerPort: 8080
                  name: metrics
              resources:
                limits:
                  cpu: "12"
                  memory: "80Gi"
                  nvidia.com/gpu: "1"
                requests:
                  cpu: "8"
                  memory: "64Gi"
                  nvidia.com/gpu: "1"
              volumeMounts:
                - name: gcs-artifacts
                  mountPath: /mnt/artifacts
          volumes:
            - name: gcs-artifacts
              csi:
                driver: gcsfuse.csi.storage.gke.io
                volumeAttributes:
                  bucketName: ARTIFACTS_BUCKET_PLACEHOLDER
                  mountOptions: "implicit-dirs"
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule
          nodeSelector:
            cloud.google.com/gke-accelerator: nvidia-tesla-a100
          serviceAccountName: alphaevolve-training
