steps:
  # Step 1: Verify Zillow data exists in the GCS bucket
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Checking for Zillow dataset in gs://${_ARTIFACTS_BUCKET}/data/ ..."
        if gsutil -q stat "gs://${_ARTIFACTS_BUCKET}/data/properties_2016.csv" 2>/dev/null && \
           gsutil -q stat "gs://${_ARTIFACTS_BUCKET}/data/train_2016_v2.csv" 2>/dev/null; then
          echo "Dataset found in GCS bucket."
        else
          echo ""
          echo "ERROR: Zillow dataset not found in gs://${_ARTIFACTS_BUCKET}/data/"
          echo ""
          echo "Upload the dataset before running Cloud Build:"
          echo "  gsutil -m cp data/properties_2016.csv data/train_2016_v2.csv gs://${_ARTIFACTS_BUCKET}/data/"
          echo ""
          exit 1
        fi

  # Step 2: Check if image already exists, build only if needed
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if gcloud artifacts docker images describe \
          ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/alphaevolve-kaggle-evaluator:${_TAG} \
          --project=${PROJECT_ID} > /dev/null 2>&1; then
          echo "Image already exists in Artifact Registry, skipping build."
          echo "SKIP" > /workspace/.skip_build
        else
          echo "Image not found, build required."
        fi

  # Step 3: Build the container image (skipped if already exists)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -f /workspace/.skip_build ]; then
          echo "Skipping build — image already exists."
        else
          docker build -t ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/alphaevolve-kaggle-evaluator:${_TAG} deploy/
        fi

  # Step 4: Push to Artifact Registry (skipped if already exists)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -f /workspace/.skip_build ]; then
          echo "Skipping push — image already exists."
        else
          docker push ${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/alphaevolve-kaggle-evaluator:${_TAG}
        fi

  # Step 5: Deploy to Cloud Run with GCS volume mount
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'alphaevolve-kaggle-evaluator'
      - '--image'
      - '${_AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/alphaevolve-kaggle-evaluator:${_TAG}'
      - '--region'
      - '${_DEPLOY_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '8Gi'
      - '--cpu'
      - '4'
      - '--timeout'
      - '300'
      - '--no-allow-unauthenticated'
      - '--max-instances'
      - '4'
      - '--concurrency'
      - '1'
      - '--add-volume=name=artifacts,type=cloud-storage,bucket=${_ARTIFACTS_BUCKET},readonly=true'
      - '--add-volume-mount=volume=artifacts,mount-path=/mnt/artifacts'
      - '--set-env-vars'
      - 'ARTIFACTS_PATH=/mnt/artifacts'

substitutions:
  _AR_REGION: us-central1
  _DEPLOY_REGION: us-central1
  _REPO: alphaevolve
  _TAG: latest
  _ARTIFACTS_BUCKET: ''

options:
  logging: CLOUD_LOGGING_ONLY
